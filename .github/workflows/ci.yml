name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python package
        run: python -m pip install -e .

      - name: Validate config
        run: make validate

      - name: Render localnet
        run: make render-localnet

      - name: Readiness report
        run: make readiness

      - name: Validate Peachtree recursive learning fixtures
        run: make peachtree-validate

      - name: Install Python package
        run: pip install -e .

      - name: Run Python unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Validate funding configuration
        run: make funding-validate


  go:
    name: Go Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: make go-test

      - name: Build 0aid
        run: make go-build
